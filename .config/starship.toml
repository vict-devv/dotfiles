palette = "noctalia"

format = """
$directory$character
"""
right_format = """$all"""

add_newline = false

[directory]
read_only=" 󰌾"

[aws]
disabled = true
#format = '[$symbol($profile )(\($region\) )(\[$duration\] )]($style)'

[cmd_duration]
disabled = true

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '

[golang]
format = '[$symbol ($version )]($style)'
symbol = ''

[nodejs]
format = '[$symbol ($version )]($style)'
symbol = '󰎙'

[python]
format = '[${symbol} ${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = ''

[kubernetes]
disabled = false
format = '[$symbol $context(\($namespace\))]($style) '
symbol = ''
detect_extensions = ['k8s.yaml', 'k8s.yml', 'yaml', 'yml']

[terraform]
format = '[$symbol $workspace]($style) '
symbol = ''

[rust]
format = '[$symbol ($version )]($style)'
symbol = ''

[lua]
format = '[$symbol ($version )]($style)'
symbol = ''

[package]
format = '[$symbol $version]($style) '
symbol = ''

